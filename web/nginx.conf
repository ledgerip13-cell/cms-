map $http_cf_connecting_ip $vcms_real_ip {
    default $http_cf_connecting_ip;
    "" $remote_addr;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # index.html 不能被长期缓存：它引用的 JS/CSS 文件名带内容哈希，若 index.html 本身被浏览器缓存住，
    # 就永远拿到旧构建产物的文件名，新代码部署后用户看到的依旧是旧代码（实测发现缺失，07-07补）。
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 带内容哈希的构建产物（assets/xxx-[hash].js/css）可以长期缓存：文件内容一变文件名就变，安全
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /sw.js =404;
    }

    location = /robots.txt {
        proxy_pass http://server:5150;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sitemap.xml {
        proxy_pass http://server:5150;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /vod/ {
        proxy_pass http://server:5150;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 反代到 server 容器（含分享页解析）
    location /api/ {
        proxy_pass http://server:5150;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $vcms_real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Connecting-IPv6 $http_cf_connecting_ipv6;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
