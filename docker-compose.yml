name: video-cms

services:
  postgres:
    image: postgres:16-alpine
    container_name: vcms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - vcms_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5155:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: vcms-server
    restart: unless-stopped
    environment:
      PORT: "5150"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:5150:5150"

  admin:
    build: ./admin
    container_name: vcms-admin
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5151:80"      # 对外可访问(后台有鉴权)

  web:
    build: ./web
    container_name: vcms-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5152:80"      # 对外可访问(观众前端)

volumes:
  vcms_pgdata:
    external: true
